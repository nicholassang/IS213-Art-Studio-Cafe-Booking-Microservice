services:

  menu-db:
    image: postgres:16
    container_name: menu-db
    environment:
      - POSTGRES_DB=menu_db
      - POSTGRES_USER=menu_user
      - POSTGRES_PASSWORD=menu_pass
    ports:
      - "5433:5432"
    volumes:
      - menu_db_data:/var/lib/postgresql/data
      - ./services/menu-service/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U menu_user -d menu_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  foodorder-db:
    image: postgres:16
    container_name: foodorder-db
    environment:
      - POSTGRES_DB=foodorder_db
      - POSTGRES_USER=foodorder_user
      - POSTGRES_PASSWORD=foodorder_pass
    ports:
      - "5434:5432"
    volumes:
      - foodorder_db_data:/var/lib/postgresql/data
      - ./services/foodOrder-service/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodorder_user -d foodorder_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-db:
    image: postgres:16
    container_name: user-db
    environment:
      - POSTGRES_DB=user_db
      - POSTGRES_USER=user_user
      - POSTGRES_PASSWORD=user_pass
    ports:
      - "5435:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
      - ./services/user-service/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_user -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  kong:
    image: kong:3.7
    container_name: kong-api-gateway
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      user-service:
        condition: service_healthy
      composite-service:
        condition: service_started
      activity-service:
        condition: service_started
      ai-recommender-composite-service:
        condition: service_started

  # Legacy gateway retained for reference only.
  # It is disabled by default and only starts when profile `legacy-gateway` is enabled.
  api-gateway-legacy:
    profiles: ["legacy-gateway"]
    build: ./api-gateway
    container_name: api-gateway-legacy
    ports:
      - "8008:8000"
    environment:
      - COMPOSITE_URL=http://composite-service:8000
      - AI_RECOMMENDER_COMPOSITE_URL=http://ai-recommender-composite-service:8000
      - ACTIVITY_URL=http://activity-service:8000
    depends_on:
      - user-service
      - composite-service
      - activity-service
      - ai-recommender-composite-service


  user-service:
    build: ./services/user-service
    container_name: user-service
    environment:
      - DATABASE_URL=postgresql://user_user:user_pass@user-db:5432/user_db
      - SESSION_SECRET=supersecret123
    depends_on:
      user-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/profile')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    # expose a port only for debugging; composite and gateway use the internal network
    ports:
      - "8005:8000"

  composite-service:
    build: ./composite-service/make-booking-composite-service
    container_name: make-booking-composite-service
    environment:
      - AUTH_URL=http://auth-service:8000
      - AI_RECOMMENDATION_URL=http://ai-recommendation-wrapper:8000
      - PAYMENT_URL=http://payment-wrapper:8000
      - NOTIFICATION_URL=http://notification-service:8000
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - rabbitmq
      - user-service
      - ai-recommendation-wrapper
      - payment-wrapper
      - menu-service
      - foodorder-service
      - activity-service
      - notification-service

  ai-recommender-composite-service:
    build: ./composite-service/ai-recommender-composite-service
    container_name: ai-recommender-composite-service
    ports:
      - "8009:8000"
    depends_on:
      - quiz-service
      - ai-recommendation-wrapper

  ai-recommendation-wrapper:
    build: ./wrappers/ai-recommendation-wrapper
    container_name: ai-recommendation-wrapper
    ports:
      - "8006:8000"
    env_file:
      - ./wrappers/ai-recommendation-wrapper/.env
    depends_on:
      - rabbitmq

  payment-wrapper:
    build: ./wrappers/payment-wrapper
    container_name: payment-wrapper
    ports:
      - "8007:8000"
    env_file:
      - ./wrappers/payment-wrapper/.env
      
  notification-service:
    build:
      context: .
      dockerfile: ./services/notification_service/Dockerfile
    container_name: notification-service
    environment:
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-artcafebookings@nicholassang.com}
      - RESEND_TEST_RECIPIENT=${RESEND_TEST_RECIPIENT:-}
      - RESEND_FORCE_TEST_RECIPIENT=${RESEND_FORCE_TEST_RECIPIENT:-false}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - rabbitmq
    ports:
     - "8010:8000"

  activity-service:
    build:
      context: ./services/activity-service
      dockerfile: Dockerfile
    container_name: activity-service
    env_file : 
       - ./services/activity-service/.env
    ports:
     - "8011:8000"

  quiz-service:
    build:
      context: ./services/quiz-service
      dockerfile: Dockerfile
    container_name: quiz-service
    env_file:
      - ./services/quiz-service/.env
    ports:
     - "8012:8000"

  menu-service:
    build:
      context: ./services/menu-service
      dockerfile: Dockerfile
    container_name: menu-service
    environment:
      - DATABASE_URL=postgresql://menu_user:menu_pass@menu-db:5432/menu_db
    depends_on:
      menu-db:
        condition: service_healthy
    ports:
     - "8013:8000"

  foodorder-service:
    build:
      context: ./services/foodOrder-service
      dockerfile: Dockerfile
    container_name: foodorder-service
    environment:
      - DATABASE_URL=postgresql://foodorder_user:foodorder_pass@foodorder-db:5432/foodorder_db
    depends_on:
      foodorder-db:
        condition: service_healthy
    ports:
     - "8014:8000"


volumes:
  menu_db_data:
  foodorder_db_data:
  user_db_data:


